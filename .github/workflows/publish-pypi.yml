name: Publish to PyPI

on:
  push:
    tags:
      - "py/v*"
      - "cli/v*"

permissions:
  contents: read

jobs:
  detect-package:
    name: Detect package from tag
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.detect.outputs.package-name }}
      manifest-dir: ${{ steps.detect.outputs.manifest-dir }}
    steps:
      - name: Detect package
        id: detect
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == py/v* ]]; then
            echo "package-name=oboron" >> "$GITHUB_OUTPUT"
            echo "manifest-dir=oboron-py" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == cli/v* ]]; then
            echo "package-name=oboron-cli" >> "$GITHUB_OUTPUT"
            echo "manifest-dir=oboron-cli" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag prefix: $TAG" >&2
            exit 1
          fi

  build-wheels:
    name: Build wheels (${{ matrix.target }})
    needs: detect-package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --manifest-path ${{ needs.detect-package.outputs.manifest-dir }}/Cargo.toml
            --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    needs: detect-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: >-
            --manifest-path ${{ needs.detect-package.outputs.manifest-dir }}/Cargo.toml
            --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect dist files
        run: |
          mkdir dist
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
