[package]
name = "oboron-py"
version = "0.4.0"
edition = "2021"

[lib]
name = "_oboron"
crate-type = ["cdylib"]

[features]
default = ["all-schemes", "legacy", "experimental", "keyless", "legacy", "mock1"]

ob00 = ["oboron/ob00"]
zdc = ["oboron/zdc"]
adgs = ["oboron/adgs"]
adsv = ["oboron/adsv"]
upc = ["oboron/upc"]
apgs = ["oboron/apgs"]
apsv = ["oboron/apsv"]
mock1 = ["oboron/mock1"]
mock2 = ["oboron/mock2"]
all-schemes = ["zdc", "upc", "adgs", "apgs", "adsv", "apsv"]

keyless = ["oboron/keyless"]

# Feature groups
legacy = ["ob00"]  # For compatibility/testing
experimental = []  # Experimental algorithms

[dependencies]
oboron = { version = "0.4", path = "../oboron", default-features = false, features=["full"] }
pyo3 = { version = "0.22", features = ["extension-module"] }
hex = "0.4"

