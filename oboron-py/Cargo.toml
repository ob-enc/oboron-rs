[package]
name = "oboron-py"
version = "0.4.0"
edition = "2021"

[lib]
name = "_oboron"
crate-type = ["cdylib"]

[features]
default = ["all-schemes", "legacy", "experimental", "keyless", "legacy", "ob70"]

ob00 = ["oboron/ob00"]
zdc = ["oboron/zdc"]
adgs = ["oboron/adgs"]
ob32 = ["oboron/ob32"]
upc = ["oboron/upc"]
apgs = ["oboron/apgs"]
ob32p = ["oboron/ob32p"]
ob70 = ["oboron/ob70"]
ob71 = ["oboron/ob71"]
all-schemes = ["zdc", "upc", "adgs", "apgs", "ob32", "ob32p"]

keyless = ["oboron/keyless"]

# Feature groups
legacy = ["ob00"]  # For compatibility/testing
experimental = []  # Experimental algorithms

[dependencies]
oboron = { version = "0.4", path = "../oboron", default-features = false, features=["full"] }
pyo3 = { version = "0.22", features = ["extension-module"] }
hex = "0.4"

